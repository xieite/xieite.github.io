<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width"/>

		<title>XTE_UNWRAP()</title>
	</head>
	<body>
		<input type="checkbox"/>
		<iframe src="/links.html"></iframe>
		<main>
			<h2><code><a href="/"><j_>XTE</j_></a><j_>_</j_><a href=""><j_>UNWRAP</j_>()</a></code></h2>
			<small>Defined in header <code><a target="_blank" href="https://github.com/Eczbek/xieite/blob/main/include/xte/preproc/unwrap.hpp"><s_>&lt;xte/preproc/unwrap.hpp&gt;</s_></a></code></small><br/>
			<br/>
			Unwraps an expression from surrounding parentheses.<br/>
			<br/>
			<br/>
			<h3><a id="def" href="#def">Definition</a></h3>
			<blockquote>
<pre><p_>#define</p_> <j_>XTE_UNWRAP</j_>(<k_>...</k_>) <w_>/* ... */</w_></pre>
			</blockquote>
			<br/>
			<br/>
			<br/>
			<h3><a id="ex" href="#ex">Example</a></h3>
			<blockquote>
<pre><a href="#def"><j_>XTE_UNWRAP</j_></a>((<n_>1</n_>, <s_>'2'</s_>, <v_>x</v_>))</pre>
			</blockquote>
			<small>Preprocessor output:</small>
			<blockquote>
<pre><n_>1</n_>, <s_>'2'</s_>, <v_>x</v_></pre>
			</blockquote>
			<small><a target="_blank" href="https://godbolt.org/z/zq1radq5j" class="g">[View in Compiler Explorer]</a></small>
		</main>
	</body>
