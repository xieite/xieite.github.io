<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width"/>
		<link rel="stylesheet" href="/style.css"/>
		<link rel="shortcut icon" href="/icon.png"/>
		<title>XTE_ANY()</title>
	</head>
	<body>
		<input type="checkbox"/>
		<iframe src="/links.html"></iframe>
		<main>
			<h2><code><a href="/"><i_>XTE</i_></a><i_>_</i_><a href=""><i_>ANY</i_>()</a></code></h2>
			<small>Defined in header <code><a target="_blank" href="https://github.com/Eczbek/xieite/blob/main/include/xte/preproc/any.hpp"><s_>&lt;xte/preproc/any.hpp&gt;</s_></a></code></small><br/>
			<br/>
			Expands to <code><n_>1</n_></code> if anything is passed, otherwise expands to <code><n_>0</n_></code>.<br/>
			<br/>
			<br/>
			<h3><a id="def" href="#def">Definition</a></h3>
			<blockquote>
<pre><p_>#define</p_> <j_>XTE_ANY</j_>(<k_>...</k_>) <w_>/* boolean integer literal */</w_></pre>
			</blockquote>
			<br/>
			<br/>
			<br/>
			<h3><a id="ex" href="#ex">Example</a></h3>
			<blockquote>
<pre><a href="#def"><j_>XTE_ANY</j_></a>()
<a href="#def"><j_>XTE_ANY</j_></a>(abcdef)</pre>
			</blockquote>
			<small>Preprocessor output:</small>
			<blockquote>
<pre><n_>0</n_>
<n_>1</n_></pre>
			</blockquote>
			<small><a target="_blank" href="https://godbolt.org/z/PhcM1P7jG" class="g">[View in Compiler Explorer]</a></small>
		</main>
	</body>
</html>
